# SC2 Bot - Cortex Configuration
# Horizontally scalable, highly available Prometheus with multi-tenancy

target: all

# --- Auth & Multi-tenancy ---
auth_enabled: true

# Tenant: sc2bot
# Use X-Scope-OrgID: sc2bot header in all requests

# --- Server ---
server:
  http_listen_port: 9009
  grpc_listen_port: 9095
  log_level: info

# --- Distributor ---
distributor:
  pool:
    health_check_ingesters: true
  shard_by_all_labels: true
  ring:
    kvstore:
      store: consul
      consul:
        host: consul:8500
    heartbeat_timeout: 1m

# --- Ingester ---
ingester:
  lifecycler:
    address: 0.0.0.0
    ring:
      kvstore:
        store: consul
        consul:
          host: consul:8500
      replication_factor: 3
    final_sleep: 0s
    num_tokens: 512
  chunk_idle_period: 30m
  chunk_block_duration: 15m
  max_transfer_retries: 0
  wal:
    dir: /var/cortex/wal
    enabled: true

# --- Querier ---
querier:
  active_query_tracker_dir: /var/cortex/active-query-tracker
  query_ingesters_within: 13h
  store_gateway_addresses: dns+store-gateway:9095

# --- Query Frontend ---
frontend:
  log_queries_longer_than: 10s
  compress_responses: true
  max_outstanding_per_tenant: 200

query_range:
  split_queries_by_interval: 24h
  align_queries_with_step: true
  cache_results: true
  results_cache:
    cache:
      memcached:
        expiration: 1h
        addresses: dns+memcached:11211

# --- Compactor ---
compactor:
  sharding_enabled: true
  sharding_ring:
    kvstore:
      store: consul
      consul:
        host: consul:8500
  data_dir: /var/cortex/compactor
  cleanup_interval: 15m

# --- Ruler ---
ruler:
  enable_api: true
  ring:
    kvstore:
      store: consul
      consul:
        host: consul:8500
  rule_path: /var/cortex/rules
  alertmanager_url: http://alertmanager:9093
  tenant_federation:
    enabled: true

# --- Storage: S3 ---
blocks_storage:
  backend: s3
  s3:
    bucket_name: sc2-cortex-blocks
    endpoint: s3.amazonaws.com
    region: us-east-1
    access_key_id: "${AWS_ACCESS_KEY_ID}"
    secret_access_key: "${AWS_SECRET_ACCESS_KEY}"
  tsdb:
    dir: /var/cortex/tsdb
    retention_period: 13h
  bucket_store:
    sync_dir: /var/cortex/tsdb-sync
    index_cache:
      backend: memcached
      memcached:
        addresses: dns+memcached:11211

# --- Limits (per-tenant: sc2bot) ---
limits:
  ingestion_rate: 100000
  ingestion_burst_size: 200000
  max_series_per_user: 1000000
  max_label_names_per_series: 30
  ruler_max_rules_per_rule_group: 50
  ruler_max_rule_groups_per_tenant: 100
