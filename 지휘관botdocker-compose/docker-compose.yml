# Wicked Zerg - Docker Compose
# Phase 162: Docker Compose

version: '3.8'

services:
  sc2-bot:
    build: .
    container_name: wicked-zerg-bot
    ports:
      - "8080:8080"
    environment:
      - PYTHONUNBUFFERED=1
      - SC2_API_KEY=${SC2_API_KEY}
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  postgres:
    image: postgres:15
    container_name: postgres-db
    environment:
      POSTGRES_DB: sc2bot
      POSTGRES_USER: botuser
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  redis-data:
  postgres-data:
