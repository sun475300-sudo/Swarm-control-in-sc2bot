# Phase 488: ExternalDNS Automatic DNS Management for SC2
# Provider: Route53, source: ingress+service, TXT ownership records

apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-dns
  namespace: sc2bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: external-dns
  template:
    metadata:
      labels:
        app: external-dns
    spec:
      serviceAccountName: external-dns
      containers:
        - name: external-dns
          image: registry.k8s.io/external-dns/external-dns:v0.14.0
          args:
            - --source=ingress
            - --source=service
            - --domain-filter=sc2bot.io
            - --provider=aws
            - --aws-zone-type=public
            - --registry=txt
            - --txt-owner-id=sc2bot-k8s-cluster
            - --txt-prefix=externaldns-
            - --policy=upsert-only
            - --log-level=info
          env:
            - name: AWS_DEFAULT_REGION
              value: us-east-1

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-dns
  namespace: sc2bot
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/sc2bot-external-dns-role

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: external-dns
rules:
  - apiGroups: [""]
    resources: ["services", "endpoints", "pods", "nodes"]
    verbs: ["get", "watch", "list"]
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "watch", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: external-dns
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: external-dns
subjects:
  - kind: ServiceAccount
    name: external-dns
    namespace: sc2bot
