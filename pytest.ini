[pytest]
# pytest configuration for Wicked Zerg Challenger

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --color=yes

# Markers
markers =
    unit: Unit tests for individual components
    integration: Integration tests for multiple components
    performance: Performance and benchmark tests
    asyncio: Async test functions
    slow: Tests that take more than 1 second

# Coverage options (if pytest-cov is installed)
# Uncomment to enable coverage reporting
# addopts = --cov=wicked_zerg_challenger --cov-report=html --cov-report=term

# Asyncio mode
asyncio_mode = auto

# Timeout for tests (in seconds).
# Requires the optional `pytest-timeout` plugin. The option is only
# read if that plugin is installed; otherwise pytest emits
# "PytestConfigWarning: Unknown config option: timeout". Keep the
# value here so timeouts are enforced when the plugin is present,
# and silence the warning via the filterwarnings entry below when
# it isn't.
timeout = 60

filterwarnings =
    ignore:Unknown config option

# Minimum Python version
minversion = 3.8
