[pytest]
# pytest configuration for Wicked Zerg Challenger

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --color=yes

# Markers
markers =
    unit: Unit tests for individual components
    integration: Integration tests for multiple components
    performance: Performance and benchmark tests
    asyncio: Async test functions
    slow: Tests that take more than 1 second

# Coverage options (if pytest-cov is installed)
# Uncomment to enable coverage reporting
# addopts = --cov=wicked_zerg_challenger --cov-report=html --cov-report=term

# Asyncio mode
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Timeout for tests (in seconds) — requires pytest-timeout plugin.
# Plugin not always installed in local/CI; commented to avoid
# "Unknown config option: timeout" warning. Re-enable after
# `pip install pytest-timeout`.
# timeout = 60

# Minimum Python version
minversion = 3.8
