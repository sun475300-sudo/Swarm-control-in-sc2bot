[pytest]
# pytest configuration for Wicked Zerg Challenger

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --color=yes

# Markers
markers =
    unit: Unit tests for individual components
    integration: Integration tests for multiple components
    performance: Performance and benchmark tests
    asyncio: Async test functions
    slow: Tests that take more than 1 second

# Coverage options (if pytest-cov is installed)
# Uncomment to enable coverage reporting
# addopts = --cov=wicked_zerg_challenger --cov-report=html --cov-report=term

# Asyncio mode
asyncio_mode = auto

# Default loop scope for async fixtures (silences pytest-asyncio
# PytestDeprecationWarning about unset fixture loop scope)
asyncio_default_fixture_loop_scope = function

# Filter noisy third-party deprecation warnings unrelated to our code,
# plus the unittest "test returned non-None" warning that fires when
# async test_* methods sit on plain unittest.TestCase classes.
# TODO: rewrite the affected tests onto IsolatedAsyncioTestCase or
# pytest-asyncio plain functions and drop the last two filters. Tests
# affected: tests/test_production_resilience.py (test_get_counter_unit_*),
# tests/test_opponent_modeling.py (multiple async tests).
filterwarnings =
    ignore::DeprecationWarning:google.protobuf.*
    ignore::DeprecationWarning:s2clientprotocol.*
    ignore:It is deprecated to return a value that is not None from a test case:DeprecationWarning
    ignore:coroutine .* was never awaited:RuntimeWarning

# Timeout for tests (in seconds)
timeout = 60

# Minimum Python version
minversion = 3.8
