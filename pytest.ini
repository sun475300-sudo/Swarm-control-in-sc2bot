[pytest]
# pytest configuration for Wicked Zerg Challenger

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --color=yes

# Markers
markers =
    unit: Unit tests for individual components
    integration: Integration tests for multiple components
    performance: Performance and benchmark tests
    asyncio: Async test functions
    slow: Tests that take more than 1 second

# Coverage options (if pytest-cov is installed)
# Uncomment to enable coverage reporting
# addopts = --cov=wicked_zerg_challenger --cov-report=html --cov-report=term

# Asyncio mode
asyncio_mode = auto

# Pin asyncio fixture loop scope to silence the pytest-asyncio 1.x deprecation
# warning ("default fixture loop scope is unset"). Function scope matches the
# legacy behaviour expected by existing fixtures.
asyncio_default_fixture_loop_scope = function

# Timeout for tests (in seconds) — requires pytest-timeout. Optional; the
# `timeout` key triggers an unknown-config warning if the plugin is absent.
# Uncomment after installing pytest-timeout (already listed in requirements-dev.txt).
# timeout = 60

# Minimum Python version
minversion = 3.8
