[pytest]
# pytest configuration for Wicked Zerg Challenger

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# 봇 코어가 wicked_zerg_challenger 디렉터리를 sys.path 루트로 가정하는
# 절대 임포트(`from utils.logger import get_logger` 등) 를 많이 사용한다.
# pytest 의 기본 importmode=prepend 는 테스트 임포트 시 rootdir 를
# sys.path[0] 에 일시 삽입해서 top-level `utils/` 더미 패키지를 먼저
# 잡히게 만들기 때문에 ImportError 가 난다. importmode=importlib 는 sys.path
# 조작 없이 importlib.util.spec_from_file_location 으로 모듈을 로드하므로
# 컨프테스트에서 강제한 sys.path 순서가 유지된다.
addopts =
    --import-mode=importlib
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --color=yes

# Markers
markers =
    unit: Unit tests for individual components
    integration: Integration tests for multiple components
    performance: Performance and benchmark tests
    asyncio: Async test functions
    slow: Tests that take more than 1 second

# Coverage options (if pytest-cov is installed)
# Uncomment to enable coverage reporting
# addopts = --cov=wicked_zerg_challenger --cov-report=html --cov-report=term

# Asyncio mode
asyncio_mode = auto

# Timeout for tests (in seconds)
timeout = 60

# Minimum Python version
minversion = 3.8
