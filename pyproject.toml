[tool.black]
line-length = 88
target-version = ["py310"]
include = '\.pyi?$'
extend-exclude = '(/wicked_zerg_challenger/monitoring/|/wicked_zerg_challenger/tools/)'

[tool.isort]
profile = "black"
line_length = 88
known_first_party = [
  "src",
  "tests",
  "wicked_zerg_challenger",
  "scripts",
  "tools",
]

[tool.ruff]
line-length = 100
target-version = "py310"
extend-exclude = [
  "wicked_zerg_challenger/monitoring",
  "wicked_zerg_challenger/tools",
]

[tool.ruff.lint.per-file-ignores]
# 테스트는 sys.path를 조작한 뒤 import하는 패턴이 흔하고, try/except로 모듈
# 가용성을 확인하기 위해 사용하지 않는 심볼을 import하기도 한다.
"tests/**" = ["E402", "F401"]
"wicked_zerg_challenger/tests/**" = ["E402", "F401"]
"**/test_*.py" = ["E402", "F401"]
# 시각화 스크립트는 좌표 변수에 ``l/t/w/h``(left/top/width/height) 컨벤션을
# 쓰며 ``from ursina import *`` 와일드카드도 의도적이다. 본격적인 봇 로직이
# 아니므로 룰을 완화한다.
"wicked_zerg_challenger/visuals/**" = ["E741", "F403", "F405", "E402"]
# 러너/엔트리 스크립트는 sys.path/환경변수 조작 후에 import해야 하는 경우가
# 많아 E402가 정당하다.
"wicked_zerg_challenger/run_*.py" = ["E402"]
"wicked_zerg_challenger/single_game_*.py" = ["E402"]
"wicked_zerg_challenger/replay_feedback_loop.py" = ["E402"]
"wicked_zerg_challenger/adaptive_trainer.py" = ["E402"]
"wicked_zerg_challenger/progressive_difficulty_trainer.py" = ["E402"]
"wicked_zerg_challenger/local_training/scripts/**" = ["E402"]
