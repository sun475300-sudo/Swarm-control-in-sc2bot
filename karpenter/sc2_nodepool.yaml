# Phase 490: Karpenter Autoscaling for SC2 K8s Cluster
# NodePool: GPU training + CPU inference, EC2NodeClass spot instances, consolidation

apiVersion: karpenter.sh/v1beta1
kind: NodePool
metadata:
  name: sc2-gpu-training
spec:
  template:
    metadata:
      labels:
        role: gpu-training
        workload: sc2-training
    spec:
      nodeClassRef:
        apiVersion: karpenter.k8s.aws/v1beta1
        kind: EC2NodeClass
        name: sc2-gpu-nodeclass
      requirements:
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: ["g", "p"]
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values: ["3"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
  limits:
    cpu: "64"
    memory: 512Gi
    nvidia.com/gpu: "8"
  disruption:
    consolidationPolicy: WhenUnderutilized
    consolidateAfter: 30s

---
apiVersion: karpenter.sh/v1beta1
kind: NodePool
metadata:
  name: sc2-cpu-inference
spec:
  template:
    metadata:
      labels:
        role: cpu-inference
        workload: sc2-inference
    spec:
      nodeClassRef:
        apiVersion: karpenter.k8s.aws/v1beta1
        kind: EC2NodeClass
        name: sc2-cpu-nodeclass
      requirements:
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: ["c", "m"]
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values: ["5"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot"]
  limits:
    cpu: "128"
    memory: 256Gi
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 60s

---
apiVersion: karpenter.k8s.aws/v1beta1
kind: EC2NodeClass
metadata:
  name: sc2-gpu-nodeclass
spec:
  amiFamily: AL2
  role: sc2bot-node-role
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: sc2bot-cluster
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: sc2bot-cluster
  instanceStorePolicy: RAID0
  userData: |
    #!/bin/bash
    /etc/eks/bootstrap.sh sc2bot-cluster
    nvidia-smi -pm 1

---
apiVersion: karpenter.k8s.aws/v1beta1
kind: EC2NodeClass
metadata:
  name: sc2-cpu-nodeclass
spec:
  amiFamily: AL2
  role: sc2bot-node-role
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: sc2bot-cluster
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: sc2bot-cluster
