name: SC2 Bot CI/CD Pipeline

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * 0"   # Weekly Sunday 02:00 UTC

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/sc2bot
  PYTHON_DEFAULT: "3.11"

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install lint dependencies
        run: pip install flake8 mypy black isort bandit

      - name: Run black (format check)
        run: black --check --diff .

      - name: Run isort (import order)
        run: isort --check-only --diff .

      - name: Run flake8 (full — non-blocking, informational)
        continue-on-error: true
        run: flake8 . --max-line-length=100 --exclude=.git,__pycache__,venv

      - name: Run flake8 (critical — blocking)
        run: flake8 . --select=E9,F63,F7,F82 --exclude=.git,__pycache__,venv,5.9.0

      - name: Run mypy (non-blocking, informational)
        continue-on-error: true
        run: mypy . --ignore-missing-imports --strict

      - name: Run bandit (security — non-blocking, informational)
        continue-on-error: true
        run: bandit -r . -ll --exclude ./tests

  # ── Test ──────────────────────────────────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Free up disk space
        # Ubuntu-latest runners ship with ~14GB free + ~17GB consumed by
        # pre-installed SDKs (.NET, Haskell, Boost, Android tooling). Even
        # the CPU-only torch + the rest of requirements.txt push install
        # time over 3 minutes and have been hitting "exit code 1" at
        # 'Install dependencies'. Reclaim ~30GB up front so the next
        # `pip install` has room to breathe.
        run: |
          echo "::group::Disk space (before)"
          df -h
          echo "::endgroup::"
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /usr/local/share/boost || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf "$AGENT_TOOLSDIRECTORY" || true
          echo "::group::Disk space (after)"
          df -h
          echo "::endgroup::"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip

      - name: Install dependencies
        # Pre-install CPU-only torch to avoid pulling ~5GB of CUDA libraries
        # (nvidia-cudnn / cublas / cuda-toolkit / triton …). The CI runner has
        # ~14GB of free disk and the full CUDA torch causes the install step
        # to exit code 1 (disk-exhausted). Tests don't need GPU support.
        #
        # APPROACH: install CPU torch with --no-deps from pytorch.org/cpu, then
        # install everything else from PyPI. The follow-up install fetches
        # torch's deps (sympy / networkx / jinja2 / fsspec / typing_extensions)
        # from PyPI but leaves torch itself alone because the already-installed
        # CPU torch satisfies `torch>=2.0.0` (pip default strategy is
        # "only-if-needed" for `-r requirements.txt`).
        #
        # Why other approaches failed:
        #   - --extra-index-url alone: pip picks higher-version GPU torch from
        #     PyPI (2.x.0 vs 2.x.0+cpu PEP 440 ordering can flip).
        #   - --index-url alone: pytorch.org/cpu has only torch wheels — torch's
        #     transitive deps 404 since they aren't hosted there.
        #   - --index-url + --extra-index-url: pip can still prefer the GPU
        #     wheel during the resolution pass.
        #   - --no-deps + --index-url: deterministic; torch comes ONLY from
        #     pytorch.org/cpu, deps come ONLY from PyPI in the next step.
        run: |
          pip install --no-cache-dir --no-deps \
            --index-url https://download.pytorch.org/whl/cpu \
            torch
          pip install --no-cache-dir -r requirements.txt pytest pytest-cov pytest-asyncio

      - name: Run unit tests
        # NOTE: tests/unit/ doesn't exist in this repo — unit tests live directly
        # under tests/ and wicked_zerg_challenger/tests/. The integration suite
        # is collected separately below via tests/integration/.
        run: |
          pytest tests/ wicked_zerg_challenger/tests/ \
            --ignore=tests/integration \
            -v --cov=. --cov-report=xml --cov-report=term

      - name: Run integration tests
        run: pytest tests/integration -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ── Build Docker ──────────────────────────────────────────────────────────
  build_docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build Docker image (no push)
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Push to Registry ──────────────────────────────────────────────────────
  push_to_registry:
    name: Push to GHCR
    runs-on: ubuntu-latest
    needs: build_docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ needs.build_docker.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to Kubernetes ──────────────────────────────────────────────────
  deploy_to_k8s:
    name: Deploy Rolling Update
    runs-on: ubuntu-latest
    needs: push_to_registry
    environment: production
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Set image tag in manifests
        run: |
          IMAGE_TAG=$(echo "${{ needs.build_docker.outputs.image_tag }}" | head -1)
          sed -i "s|IMAGE_TAG_PLACEHOLDER|${IMAGE_TAG}|g" helm_charts/sc2bot/values.yaml

      - name: Helm upgrade (rolling update)
        run: |
          helm upgrade --install sc2bot ./helm_charts/sc2bot \
            --namespace sc2bot \
            --create-namespace \
            --atomic \
            --timeout 5m \
            --set image.tag=$(git rev-parse --short HEAD)

      - name: Verify rollout
        run: kubectl rollout status deployment/sc2bot -n sc2bot --timeout=300s
