# Nginx reverse proxy configuration for SC2 AI Dashboard
# Proxies the React/FastAPI dashboard running locally on port 8765

upstream sc2_dashboard_backend {
    server 127.0.0.1:8765;
    keepalive 32;
}

upstream sc2_api_backend {
    server 127.0.0.1:8766;
    keepalive 16;
}

server {
    listen 80;
    server_name sc2bot.local dashboard.sc2bot.local;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name sc2bot.local dashboard.sc2bot.local;

    ssl_certificate     /etc/ssl/sc2bot/fullchain.pem;
    ssl_certificate_key /etc/ssl/sc2bot/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    access_log  /var/log/nginx/sc2_dashboard_access.log;
    error_log   /var/log/nginx/sc2_dashboard_error.log warn;

    # Serve static React dashboard build
    location / {
        proxy_pass         http://sc2_dashboard_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # REST API for bot stats, replay data, and live game state
    location /api/ {
        proxy_pass         http://sc2_api_backend/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
        add_header         Cache-Control "no-store";
    }

    # WebSocket endpoint for live battle feed
    location /ws/live {
        proxy_pass          http://sc2_api_backend/ws/live;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection "Upgrade";
        proxy_read_timeout  3600s;
    }
}
