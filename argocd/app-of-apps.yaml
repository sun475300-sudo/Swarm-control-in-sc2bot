apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sc2bot-app-of-apps
  namespace: argocd
  labels:
    app.kubernetes.io/name: sc2bot-app-of-apps
    app.kubernetes.io/part-of: sc2bot-platform
    tier: management
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/sc2bot/zerg-ai
    targetRevision: main
    path: argocd
    directory:
      recurse: true
      include: "*.yaml"
      exclude: "app-of-apps.yaml"

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m

  revisionHistoryLimit: 5

---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: sc2bot
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: sc2bot-platform
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: SC2 Bot GitOps Project - manages all SC2 bot related workloads

  sourceRepos:
    - "https://github.com/sc2bot/zerg-ai"
    - "https://charts.sc2bot.local/*"

  destinations:
    - namespace: sc2bot-prod
      server: https://kubernetes.default.svc
    - namespace: sc2bot-staging
      server: https://kubernetes.default.svc
    - namespace: sc2bot-dev
      server: https://kubernetes.default.svc
    - namespace: monitoring
      server: https://kubernetes.default.svc

  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: "rbac.authorization.k8s.io"
      kind: ClusterRole
    - group: "rbac.authorization.k8s.io"
      kind: ClusterRoleBinding

  namespaceResourceBlacklist:
    - group: ""
      kind: ResourceQuota
    - group: ""
      kind: LimitRange

  roles:
    - name: sc2bot-admin
      description: Full access to sc2bot project
      policies:
        - p, proj:sc2bot:sc2bot-admin, applications, *, sc2bot/*, allow
      groups:
        - sc2bot:admins
    - name: sc2bot-readonly
      description: Read-only access to sc2bot project
      policies:
        - p, proj:sc2bot:sc2bot-readonly, applications, get, sc2bot/*, allow
      groups:
        - sc2bot:viewers

  syncWindows:
    - kind: allow
      schedule: "0 6 * * 1-5"
      duration: 12h
      applications:
        - sc2bot
      manualSync: true
    - kind: deny
      schedule: "0 18 * * 5"
      duration: 60h
      applications:
        - sc2bot

  orphanedResources:
    warn: true
    ignore:
      - group: ""
        kind: ConfigMap
        name: kube-root-ca.crt
