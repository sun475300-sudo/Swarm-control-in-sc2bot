# Phase 568: Docker Compose
# SC2 Bot 전체 스택 — 멀티컨테이너 오케스트레이션
# docker compose up -d 로 전체 스택 즉시 실행

services:
  # ─── SC2 Bot Core ─────────────────────
  sc2bot:
    build:
      context: ..
      dockerfile: docker_compose/Dockerfile.bot
    container_name: sc2bot-core
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      - BOT_NAME=sc2_zerg_bot
      - BOT_VERSION=565.0
      - BOT_RACE=zerg
      - PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION=python
      - PYTHONUNBUFFERED=1
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=sc2bot
      - DB_USER=sc2admin
      - DB_PASSWORD=${DB_PASSWORD:-sc2botdev}
      - REDIS_URL=redis://redis:6379/0
      - PROMETHEUS_PORT=9090
      - TRITON_URL=triton:8001
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - bot-models:/app/models
      - bot-logs:/app/logs
      - bot-replays:/app/replays
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sc2net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4G
        reservations:
          cpus: "1.0"
          memory: 1G

  # ─── PPO Training Worker ──────────────
  trainer:
    build:
      context: ..
      dockerfile: docker_compose/Dockerfile.trainer
    container_name: sc2bot-trainer
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - TRAINING_TIMESTEPS=100000
      - MODEL_SAVE_PATH=/app/models
      - LOG_DIR=/app/logs/training
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - WANDB_MODE=offline
    volumes:
      - bot-models:/app/models
      - training-logs:/app/logs/training
    depends_on:
      - sc2bot
    networks:
      - sc2net
    deploy:
      resources:
        limits:
          cpus: "8.0"
          memory: 8G
        reservations:
          memory: 2G

  # ─── Dashboard (Next.js + tRPC) ──────
  dashboard:
    build:
      context: ..
      dockerfile: docker_compose/Dockerfile.dashboard
    container_name: sc2bot-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - BOT_API_URL=http://sc2bot:8080
      - NEXT_PUBLIC_WS_URL=ws://sc2bot:8080/ws
    depends_on:
      - sc2bot
    networks:
      - sc2net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── PostgreSQL ───────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sc2bot-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=sc2bot
      - POSTGRES_USER=sc2admin
      - POSTGRES_PASSWORD=${DB_PASSWORD:-sc2botdev}
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --locale=C
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - sc2net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sc2admin -d sc2bot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sc2bot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - sc2net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ─── Prometheus ───────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: sc2bot-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    networks:
      - sc2net

  # ─── Grafana ──────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: sc2bot-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - sc2net

  # ─── MLflow ───────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.1
    container_name: sc2bot-mlflow
    restart: unless-stopped
    ports:
      - "5000:5000"
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri postgresql://sc2admin:${DB_PASSWORD:-sc2botdev}@postgres:5432/sc2bot
        --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow-artifacts:/mlflow/artifacts
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sc2net

  # ─── Nginx Reverse Proxy ─────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: sc2bot-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - sc2bot
      - dashboard
      - grafana
    networks:
      - sc2net

# ─── Networks ─────────────────────────
networks:
  sc2net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ─── Volumes ──────────────────────────
volumes:
  bot-models:
    name: sc2bot-models
  bot-logs:
    name: sc2bot-logs
  bot-replays:
    name: sc2bot-replays
  training-logs:
    name: sc2bot-training-logs
  postgres-data:
    name: sc2bot-postgres
  redis-data:
    name: sc2bot-redis
  prometheus-data:
    name: sc2bot-prometheus
  grafana-data:
    name: sc2bot-grafana
  mlflow-artifacts:
    name: sc2bot-mlflow
