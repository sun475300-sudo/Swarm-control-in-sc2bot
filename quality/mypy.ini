# mypy strict configuration for SC2 Bot project
# Documentation: https://mypy.readthedocs.io/en/stable/config_file.html

[mypy]
# ── Python version ────────────────────────────────────────────────────────────
python_version = 3.11

# ── Strictness flags ─────────────────────────────────────────────────────────
strict = True
warn_return_any = True
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_unreachable = True

# ── Error output ──────────────────────────────────────────────────────────────
show_error_codes = True
show_column_numbers = True
show_error_context = True
pretty = True
color_output = True
error_summary = True

# ── Import discovery ─────────────────────────────────────────────────────────
ignore_missing_imports = True
follow_imports = normal
namespace_packages = True

# ── Disallow untyped code ─────────────────────────────────────────────────────
disallow_untyped_defs = True
disallow_incomplete_defs = True
disallow_untyped_calls = True
disallow_untyped_decorators = True
disallow_any_generics = True
disallow_subclassing_any = True

# ── Optional handling ────────────────────────────────────────────────────────
no_implicit_optional = True
strict_optional = True

# ── Misc ─────────────────────────────────────────────────────────────────────
check_untyped_defs = True
implicit_reexport = False
no_implicit_reexport = True

# ── Per-module overrides ──────────────────────────────────────────────────────

[mypy-tests.*]
# Relax strict rules in test files
disallow_untyped_defs = False
disallow_untyped_calls = False
warn_return_any = False

[mypy-grpc_service.*]
# gRPC generated code has partial stubs
ignore_missing_imports = True
disallow_any_generics = False

[mypy-graphql_api.*]
# Strawberry uses dynamic typing internally
disallow_untyped_decorators = False

[mypy-torch.*]
ignore_missing_imports = True

[mypy-sc2.*]
ignore_missing_imports = True

[mypy-pytest.*]
ignore_missing_imports = True

[mypy-locust.*]
ignore_missing_imports = True

[mypy-strawberry.*]
ignore_missing_imports = True
disallow_untyped_decorators = False

[mypy-mlflow.*]
ignore_missing_imports = True
