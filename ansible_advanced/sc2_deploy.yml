# Phase 567: Ansible Advanced
# SC2 Bot 프로덕션 배포 플레이북 — 멀티 호스트 자동화
---
- name: SC2 Zerg Bot — Full Deployment Playbook
  hosts: sc2_servers
  become: true
  gather_facts: true

  vars:
    bot_name: sc2_zerg_bot
    bot_version: "565.0"
    bot_user: sc2bot
    bot_group: sc2bot
    bot_home: /opt/sc2bot
    venv_dir: "{{ bot_home }}/.venv"
    log_dir: "{{ bot_home }}/logs"
    model_dir: "{{ bot_home }}/models"
    config_dir: "{{ bot_home }}/config"
    systemd_service: sc2bot
    python_version: "3.11"

    # 포트 설정
    ports:
      api: 8080
      dashboard: 3000
      metrics: 9090
      grpc: 50051

    # 경제 파라미터
    economy_config:
      gas_guard_time: 180
      drone_saturation: 22
      expansion_threshold: 300
      max_workers: 80

    # 전투 파라미터
    combat_config:
      threat_threshold: 0.6
      retreat_hp_ratio: 0.3
      micro_range_buffer: 2.0
      max_engagement_distance: 15.0

    # 모니터링 설정
    monitoring:
      prometheus_port: 9090
      node_exporter_port: 9100
      log_retention_days: 30

  handlers:
    - name: restart sc2bot
      ansible.builtin.systemd:
        name: "{{ systemd_service }}"
        state: restarted
        daemon_reload: true

    - name: reload nginx
      ansible.builtin.systemd:
        name: nginx
        state: reloaded

    - name: restart prometheus
      ansible.builtin.systemd:
        name: prometheus
        state: restarted

  pre_tasks:
    - name: Validate target OS
      ansible.builtin.assert:
        that:
          - ansible_os_family in ['Debian', 'RedHat']
          - ansible_python_version is version('3.9', '>=')
        fail_msg: "Unsupported OS or Python version"

    - name: Display deployment info
      ansible.builtin.debug:
        msg: |
          ═══════════════════════════════════════
          SC2 Bot Deployment
          Version:     {{ bot_version }}
          Target:      {{ inventory_hostname }}
          OS:          {{ ansible_distribution }} {{ ansible_distribution_version }}
          Python:      {{ ansible_python_version }}
          Environment: {{ env | default('production') }}
          ═══════════════════════════════════════

  tasks:
    # ─── System Setup ─────────────────────
    - name: Install system dependencies
      ansible.builtin.apt:
        name:
          - "python{{ python_version }}"
          - "python{{ python_version }}-venv"
          - "python{{ python_version }}-dev"
          - build-essential
          - git
          - curl
          - jq
          - nginx
          - protobuf-compiler
          - libprotobuf-dev
        state: present
        update_cache: true
      when: ansible_os_family == 'Debian'

    - name: Create bot user
      ansible.builtin.user:
        name: "{{ bot_user }}"
        group: "{{ bot_group }}"
        home: "{{ bot_home }}"
        shell: /bin/bash
        system: true
        create_home: true

    - name: Create directory structure
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ bot_user }}"
        group: "{{ bot_group }}"
        mode: "0755"
      loop:
        - "{{ bot_home }}"
        - "{{ log_dir }}"
        - "{{ model_dir }}"
        - "{{ config_dir }}"
        - "{{ bot_home }}/replays"
        - "{{ bot_home }}/backups"

    # ─── Application Deploy ───────────────
    - name: Clone/update bot repository
      ansible.builtin.git:
        repo: "https://github.com/sun475300-sudo/Swarm-control-in-sc2bot.git"
        dest: "{{ bot_home }}/src"
        version: "main"
        force: true
      become_user: "{{ bot_user }}"
      notify: restart sc2bot

    - name: Setup Python virtual environment
      ansible.builtin.pip:
        virtualenv: "{{ venv_dir }}"
        virtualenv_command: "python{{ python_version }} -m venv"
        requirements: "{{ bot_home }}/src/requirements.txt"
        state: present
      become_user: "{{ bot_user }}"

    - name: Install additional ML packages
      ansible.builtin.pip:
        virtualenv: "{{ venv_dir }}"
        name:
          - torch
          - numpy
          - scipy
          - scikit-learn
          - prometheus-client
        state: present
      become_user: "{{ bot_user }}"

    # ─── Configuration ────────────────────
    - name: Deploy bot configuration
      ansible.builtin.template:
        src: templates/bot_config.yaml.j2
        dest: "{{ config_dir }}/bot_config.yaml"
        owner: "{{ bot_user }}"
        group: "{{ bot_group }}"
        mode: "0640"
      notify: restart sc2bot

    - name: Deploy economy configuration
      ansible.builtin.copy:
        content: |
          # SC2 Bot Economy Configuration
          # Auto-generated by Ansible — Phase 567
          gas_guard_time: {{ economy_config.gas_guard_time }}
          drone_saturation: {{ economy_config.drone_saturation }}
          expansion_threshold: {{ economy_config.expansion_threshold }}
          max_workers: {{ economy_config.max_workers }}
        dest: "{{ config_dir }}/economy.yaml"
        owner: "{{ bot_user }}"
        group: "{{ bot_group }}"
        mode: "0640"
      notify: restart sc2bot

    - name: Deploy combat configuration
      ansible.builtin.copy:
        content: |
          # SC2 Bot Combat Configuration
          # Auto-generated by Ansible — Phase 567
          threat_threshold: {{ combat_config.threat_threshold }}
          retreat_hp_ratio: {{ combat_config.retreat_hp_ratio }}
          micro_range_buffer: {{ combat_config.micro_range_buffer }}
          max_engagement_distance: {{ combat_config.max_engagement_distance }}
        dest: "{{ config_dir }}/combat.yaml"
        owner: "{{ bot_user }}"
        group: "{{ bot_group }}"
        mode: "0640"
      notify: restart sc2bot

    # ─── Systemd Service ──────────────────
    - name: Deploy systemd service
      ansible.builtin.copy:
        content: |
          [Unit]
          Description=SC2 Zerg Bot v{{ bot_version }}
          After=network.target postgresql.service redis.service
          Wants=network-online.target

          [Service]
          Type=simple
          User={{ bot_user }}
          Group={{ bot_group }}
          WorkingDirectory={{ bot_home }}/src
          ExecStart={{ venv_dir }}/bin/python main.py \
            --bot-name {{ bot_name }} \
            --config {{ config_dir }}/bot_config.yaml \
            --port {{ ports.api }}
          ExecReload=/bin/kill -HUP $MAINPID
          Restart=always
          RestartSec=10
          StandardOutput=append:{{ log_dir }}/{{ bot_name }}.log
          StandardError=append:{{ log_dir }}/{{ bot_name }}.error.log

          Environment=PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION=python
          Environment=PYTHONUNBUFFERED=1
          Environment=BOT_VERSION={{ bot_version }}

          # Security hardening
          NoNewPrivileges=true
          ProtectSystem=strict
          ProtectHome=true
          ReadWritePaths={{ bot_home }}
          PrivateTmp=true

          [Install]
          WantedBy=multi-user.target
        dest: /etc/systemd/system/{{ systemd_service }}.service
        mode: "0644"
      notify: restart sc2bot

    - name: Enable and start bot service
      ansible.builtin.systemd:
        name: "{{ systemd_service }}"
        enabled: true
        state: started
        daemon_reload: true

    # ─── Nginx Reverse Proxy ──────────────
    - name: Deploy nginx site config
      ansible.builtin.copy:
        content: |
          upstream sc2bot_api {
              server 127.0.0.1:{{ ports.api }};
          }
          upstream sc2bot_dashboard {
              server 127.0.0.1:{{ ports.dashboard }};
          }
          server {
              listen 80;
              server_name {{ inventory_hostname }};

              location /api/ {
                  proxy_pass http://sc2bot_api/;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Request-ID $request_id;
              }
              location / {
                  proxy_pass http://sc2bot_dashboard/;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection "upgrade";
              }
              location /metrics {
                  proxy_pass http://127.0.0.1:{{ monitoring.prometheus_port }}/metrics;
                  allow 10.0.0.0/8;
                  deny all;
              }
          }
        dest: /etc/nginx/sites-available/sc2bot
        mode: "0644"
      notify: reload nginx

    - name: Enable nginx site
      ansible.builtin.file:
        src: /etc/nginx/sites-available/sc2bot
        dest: /etc/nginx/sites-enabled/sc2bot
        state: link
      notify: reload nginx

    # ─── Log Rotation ─────────────────────
    - name: Configure logrotate
      ansible.builtin.copy:
        content: |
          {{ log_dir }}/*.log {
              daily
              missingok
              rotate {{ monitoring.log_retention_days }}
              compress
              delaycompress
              notifempty
              create 0644 {{ bot_user }} {{ bot_group }}
              postrotate
                  systemctl reload {{ systemd_service }} 2>/dev/null || true
              endscript
          }
        dest: /etc/logrotate.d/sc2bot
        mode: "0644"

    # ─── Monitoring ───────────────────────
    - name: Deploy Prometheus node exporter
      ansible.builtin.apt:
        name: prometheus-node-exporter
        state: present
      when: ansible_os_family == 'Debian'

    - name: Add bot scrape target for Prometheus
      ansible.builtin.copy:
        content: |
          - targets:
              - '{{ inventory_hostname }}:{{ monitoring.prometheus_port }}'
              - '{{ inventory_hostname }}:{{ monitoring.node_exporter_port }}'
            labels:
              job: 'sc2bot'
              environment: '{{ env | default("production") }}'
              version: '{{ bot_version }}'
        dest: "{{ config_dir }}/prometheus_targets.yaml"
        owner: "{{ bot_user }}"
        group: "{{ bot_group }}"
        mode: "0644"

    # ─── Health Check ─────────────────────
    - name: Wait for bot to be healthy
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ ports.api }}/health"
        method: GET
        status_code: 200
      register: health_result
      retries: 10
      delay: 5
      until: health_result.status == 200
      ignore_errors: true

    - name: Display deployment result
      ansible.builtin.debug:
        msg: |
          ═══════════════════════════════════════
          Deployment Complete!
          Bot:     {{ bot_name }} v{{ bot_version }}
          Status:  {{ 'HEALTHY' if health_result.status == 200 else 'STARTING' }}
          API:     http://{{ inventory_hostname }}:{{ ports.api }}
          Dash:    http://{{ inventory_hostname }}:{{ ports.dashboard }}
          Metrics: http://{{ inventory_hostname }}:{{ monitoring.prometheus_port }}
          ═══════════════════════════════════════

  # ─── Post-deploy verification ─────────
  post_tasks:
    - name: Verify service is running
      ansible.builtin.systemd:
        name: "{{ systemd_service }}"
      register: service_state

    - name: Assert service is active
      ansible.builtin.assert:
        that: service_state.status.ActiveState == "active"
        fail_msg: "Service {{ systemd_service }} is not running!"

    - name: Gather deployment facts
      ansible.builtin.set_fact:
        deployment_summary:
          host: "{{ inventory_hostname }}"
          version: "{{ bot_version }}"
          service_state: "{{ service_state.status.ActiveState }}"
          pid: "{{ service_state.status.MainPID }}"
          deployed_at: "{{ ansible_date_time.iso8601 }}"
