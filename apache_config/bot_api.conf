# Apache VirtualHost configuration for SC2 Bot API Server
# Proxies to the Python FastAPI application (Uvicorn) on port 8766

<VirtualHost *:80>
    ServerName   api.sc2bot.local
    ServerAlias  bot-api.sc2bot.local
    Redirect permanent / https://api.sc2bot.local/
</VirtualHost>

<VirtualHost *:443>
    ServerName  api.sc2bot.local
    ServerAdmin admin@sc2bot.local
    DocumentRoot /var/www/sc2bot/public

    SSLEngine             on
    SSLCertificateFile    /etc/ssl/sc2bot/fullchain.pem
    SSLCertificateKeyFile /etc/ssl/sc2bot/privkey.pem
    SSLProtocol           all -SSLv3 -TLSv1 -TLSv1.1

    # Enable required proxy modules
    # a2enmod proxy proxy_http proxy_wstunnel headers rewrite

    ProxyPreserveHost On
    ProxyRequests     Off

    # Route all API traffic to FastAPI/Uvicorn
    ProxyPass        /api/  http://127.0.0.1:8766/api/
    ProxyPassReverse /api/  http://127.0.0.1:8766/api/

    # WebSocket support for live SC2 game state streaming
    RewriteEngine On
    RewriteCond   %{HTTP:Upgrade} websocket [NC]
    RewriteCond   %{HTTP:Connection} upgrade [NC]
    RewriteRule   ^/ws/(.*) ws://127.0.0.1:8766/ws/$1 [P,L]

    # Security headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"

    ErrorLog  /var/log/apache2/sc2bot_api_error.log
    CustomLog /var/log/apache2/sc2bot_api_access.log combined

    <Directory /var/www/sc2bot/public>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>
</VirtualHost>
