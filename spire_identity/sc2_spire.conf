# Phase 486: SPIFFE/SPIRE Workload Identity for SC2 Microservices
# Trust domain: sc2bot.local, k8s_psat attestor, X.509-SVID issuance

# SPIRE Server Configuration
server {
    bind_address = "0.0.0.0"
    bind_port = "8081"
    socket_path = "/tmp/spire-server/private/api.sock"
    trust_domain = "sc2bot.local"
    data_dir = "/opt/spire/data/server"
    log_level = "INFO"
    ca_ttl = "168h"
    default_x509_svid_ttl = "1h"
    default_jwt_svid_ttl = "5m"

    ca_subject {
        country = ["US"]
        organization = ["SC2Bot"]
        common_name = "sc2bot.local"
    }
}

plugins {
    DataStore "sql" {
        plugin_data {
            database_type = "sqlite3"
            connection_string = "/opt/spire/data/server/datastore.sqlite3"
        }
    }

    KeyManager "disk" {
        plugin_data {
            keys_path = "/opt/spire/data/server/keys.json"
        }
    }

    NodeAttestor "k8s_psat" {
        plugin_data {
            clusters = {
                "sc2bot-cluster" = {
                    service_account_allow_list = ["sc2bot:sc2-bot", "sc2bot:sc2-frontend", "sc2bot:sc2-api"]
                }
            }
        }
    }
}

# SPIRE Agent Configuration
agent {
    data_dir = "/opt/spire/data/agent"
    log_level = "INFO"
    server_address = "spire-server.sc2bot.svc.cluster.local"
    server_port = "8081"
    socket_path = "/tmp/spire-agent/public/api.sock"
    trust_bundle_path = "/opt/spire/conf/agent/bootstrap.crt"
    trust_domain = "sc2bot.local"
}

agent_plugins {
    NodeAttestor "k8s_psat" {
        plugin_data {
            cluster = "sc2bot-cluster"
            token_path = "/var/run/secrets/tokens/spire-agent"
        }
    }

    WorkloadAttestor "k8s" {
        plugin_data {
            skip_kubelet_verification = true
        }
    }

    KeyManager "memory" {
        plugin_data {}
    }
}

# Registration Entries (applied via spire-server entry create)
# spire-server entry create -spiffeID spiffe://sc2bot.local/sc2-bot      -parentID spiffe://sc2bot.local/agent/k8s_psat/sc2bot-cluster/... -selector k8s:ns:sc2bot -selector k8s:sa:sc2-bot
# spire-server entry create -spiffeID spiffe://sc2bot.local/sc2-frontend  -parentID spiffe://sc2bot.local/agent/... -selector k8s:ns:sc2bot -selector k8s:sa:sc2-frontend
# spire-server entry create -spiffeID spiffe://sc2bot.local/sc2-api       -parentID spiffe://sc2bot.local/agent/... -selector k8s:ns:sc2bot -selector k8s:sa:sc2-api
