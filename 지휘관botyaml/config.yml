# Wicked Zerg - Configuration
# Phase 163: YAML

sc2_bot:
  name: Wicked Zerg
  version: 1.0.0
  
server:
  host: 0.0.0.0
  port: 8080
  timeout: 30

training:
  epochs: 1000
  batch_size: 32
  learning_rate: 0.001
  optimizer: adam

swarm:
  max_units: 200
  formation_radius: 10
  attack_distance: 5

combat:
  micro_interval: 0.5
  retreat_threshold: 0.3
  engage_threshold: 0.7

logging:
  level: INFO
  file: logs/bot.log
  max_size: 100MB
